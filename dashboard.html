<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinosaur AI | Prediction Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2DD4BF;
            --secondary: #0D9488;
            --bg: #0F172A;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #F43F5E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            color: #F8FAFC;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge {
            background: rgba(45, 212, 191, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(45, 212, 191, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(45, 212, 191, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(45, 212, 191, 0); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2rem;
            transition: transform 0.3s ease, border 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border: 1px solid rgba(45, 212, 191, 0.3);
        }

        .col-4 { grid-column: span 4; }
        .col-8 { grid-column: span 8; }
        .col-12 { grid-column: span 12; }

        .stat-label { color: #94A3B8; font-size: 0.9rem; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2.5rem; font-weight: 800; color: #FFF; }
        .stat-unit { font-size: 1rem; color: var(--primary); font-weight: 400; margin-left: 0.3rem; }

        .chart-container {
            height: 300px;
            position: relative;
        }

        .prediction-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label { font-weight: 600; color: #CBD5E1; }
        select, input {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 12px;
            color: #FFF;
            outline: none;
            transition: border 0.3s;
        }

        select:focus, input:focus {
            border-color: var(--primary);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #0F172A;
            padding: 1.2rem;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(45, 212, 191, 0.2);
        }

        #predictionResult {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: rgba(45, 212, 191, 0.05);
            border-radius: 16px;
            text-align: center;
            display: none;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .col-4, .col-8 { grid-column: span 12; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🦖 DINOSAUR <span style="color: #FFF; font-weight: 300;">AI</span></div>
            <div class="status-badge">
                <div class="pulse"></div>
                MODEL ENGINE ACTIVE
            </div>
        </header>

        <div class="grid">
            <!-- Summary Stats -->
            <div class="card col-4">
                <p class="stat-label">Model Precision (MAE)</p>
                <p class="stat-value">21.03<span class="stat-unit">days</span></p>
                <p style="color: var(--primary); font-size: 0.8rem; margin-top: 10px;">↑ 4.2% optimized since last run</p>
            </div>
            
            <div class="card col-4">
                <p class="stat-label">Explained Variance (R2)</p>
                <p class="stat-value">0.336<span class="stat-unit">score</span></p>
            </div>

            <div class="card col-4">
                <p class="stat-label">Dataset Volume</p>
                <p class="stat-value">1.6<span class="stat-unit">MB</span></p>
            </div>

            <!-- Visualization Section -->
            <div class="card col-8">
                <h3 style="margin-bottom: 1.5rem;">Injury Recovery Distribution</h3>
                <div class="chart-container">
                    <canvas id="distChart"></canvas>
                </div>
            </div>

            <!-- Prediction Interaction -->
            <div class="card col-4">
                <h3 style="margin-bottom: 1.5rem;">AI Prediction Engine</h3>
                <div class="prediction-form">
                    <div class="input-group">
                        <label>Player Age</label>
                        <input type="number" id="predAge" value="25" min="15" max="45">
                    </div>
                    <div class="input-group">
                        <label>Position</label>
                        <select id="predPos">
                            <option value="Defender">Defender</option>
                            <option value="Midfielder">Midfielder</option>
                            <option value="Forward">Forward</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Injury Area</label>
                        <select id="predInjury">
                            <option value="Knee">Knee</option>
                            <option value="Hamstring">Hamstring</option>
                            <option value="Ankle">Ankle</option>
                        </select>
                    </div>
                    <button class="btn" onclick="simulatePrediction()">Run Prediction</button>
                    
                    <div id="predictionResult">
                        <p class="stat-label">Estimated Recovery</p>
                        <p class="stat-value" id="resValue">--</p>
                        <p class="stat-unit">Working days</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Distribution Chart
        const ctx = document.getElementById('distChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['0', '10', '20', '30', '40', '50', '60', '70', '80'],
                datasets: [{
                    label: 'Recovery Probability',
                    data: [10, 45, 80, 50, 30, 15, 8, 3, 1],
                    borderColor: '#2DD4BF',
                    backgroundColor: 'rgba(45, 212, 191, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { display: false },
                    x: { grid: { color: 'rgba(255,255,255,0.05)' } }
                }
            }
        });

        function simulatePrediction() {
            const age = document.getElementById('predAge').value;
            const res = document.getElementById('predictionResult');
            const val = document.getElementById('resValue');
            
            res.style.display = 'block';
            val.innerText = "Processing...";
            
            setTimeout(() => {
                // Mocking the model logic: older = slightly more recovery time
                let base = 25;
                if(age > 30) base += (age - 30) * 1.5;
                const randomShift = Math.random() * 5;
                val.innerText = Math.round(base + randomShift);
            }, 800);
        }
    </script>
</body>
</html>
